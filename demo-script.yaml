# StrawPot CLI Demo Video Script
# Produced with the demo-video-creator skill
# Final output: public/demo.mp4 (~54s, 1920x1080, 25fps, h264)
#
# Recording method:
#   - Title cards: Pillow (PNG) -> ffmpeg (MP4, 5s loop)
#   - Terminal scene: VHS (Catppuccin Mocha theme) running a mock strawpot binary
#     that outputs colored text via echo -e (avoids broken Hide/Show + printf approach)
#   - Mock binary: .demo-video-work/bin/strawpot
#   - VHS tape: .demo-video-work/scene-002.tape
#   - Stitched with ffmpeg xfade fade transitions (0.5s)
#
# Demo flow: ai-ceo analyzes task -> delegates to implementer (creates branch,
# writes code, runs tests, creates PR) -> delegates to code-reviewer (reviews,
# approves) -> session complete. Two-agent delegation matching the website copy.

scenes:
  # Scene 1: Opening title card (5s)
  - type: title-card
    text: "StrawPot"
    subtitle: "One Engineer. One Laptop. One AI Company."
    duration: 5s
    background: "#0f0f23"
    text_color: "#ffffff"
    font_size: 80
    subtitle_font_size: 32

  # Scene 2: CLI session — user gives task, agents collaborate (~45s)
  # Shows: typing `strawpot start --task`, ai-ceo planning & delegating,
  # implementer creating branch/writing code/testing/PR, code-reviewer
  # reviewing & approving, session complete with timing summary.
  # Recorded with VHS using a mock binary for reliable color rendering
  # (see .demo-video-work/scene-002.tape and .demo-video-work/bin/strawpot).
  - type: terminal
    commands:
      - "strawpot start --task 'Add a meta description tag for SEO'"
    typing_speed: 30ms
    wait_after: 6s
    viewport: 1920x1080
    font_size: 22
    theme: "Catppuccin Mocha"
    padding: 40
    window_bar: colorful

  # Scene 3: Closing CTA (5s)
  - type: title-card
    text: "Ship faster with AI agents"
    subtitle: "Try it at strawpot.com"
    duration: 5s
    background: "#0f0f23"
    text_color: "#ffffff"
    font_size: 72
    subtitle_font_size: 36

output:
  file: public/demo.mp4
  resolution: 1920x1080
  fps: 25
  transition: crossfade
  transition_duration: 0.5s
  codec: libx264
  crf: 23
  pixel_format: yuv420p
